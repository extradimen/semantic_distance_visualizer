version: '3.8'

services:
  semantic-visualizer:
    build: .
    container_name: semantic-visualizer
    ports:
      - "5000:5000"
    volumes:
      # 持久化结果和上传文件（可选，如果需要保留）
      - ./results:/app/results
      - ./uploads:/app/uploads
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    # 资源限制（根据服务器配置调整）
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
